<app-slot [oneLineText]="this.oneLineText" imgUrl="/images/retro_microphone0001.png" [defaultScroll]="true" title="Kontakt">
    <form #slot id="slot" [formGroup]="contactFormGroup" [class.valid]="contactFormGroup.valid" (submit)="submitForm()">
        <div id="name">
            <input name="firstname" type="text" placeholder="Vorname" formControlName="firstName" />
            <input name="surname" type="text" placeholder="Nachname" formControlName="surName" />
        </div>

        <input name="email" type="text" placeholder="E-Mail" formControlName="email" />
        <textarea name="message" placeholder="Deine Nachricht..." rows="6" formControlName="message"></textarea>

        <app-hcaptcha #captcha formControlName="captcha"></app-hcaptcha>

        <button type="submit">Nachricht abschicken</button>
    </form>
</app-slot>
