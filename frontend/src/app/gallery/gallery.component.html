<app-section-header title="Galerie"></app-section-header>

@if(!this.imagesLoaded) {
    <h3 id="load-images">Lade Bilddaten...</h3>
}
<div id="mask">
    <app-diamond-image-map [images]="this.thumbnailImageURLs" [slideshow]="true" (imageClicked)="openBigImage($event)" [parentContainer]="this.elRef" [heightCrop]="true"></app-diamond-image-map>
</div>
<button class="action" (click)="this.showBigGallery.set(true)">Zeig mir mehr →</button>

<div id="background-border"></div>

@if(this.showBigGallery()) {
<div class="overlay">
    <app-slot title="Galerie" [defaultScroll]="true" [hasCloseButton]="true" (closeEvent)="this.showBigGallery.set(false)" [contentNoPadding]="true">
        <app-diamond-image-map [images]="this.thumbnailImageURLs" [slideshow]="false" (imageClicked)="openBigImage($event)" [parentContainer]="this.elRef" [heightCrop]="false"></app-diamond-image-map>
    </app-slot>
</div>
}

@if(this.showBigImageHR() != "") {
<div id="galleryBigImage" #bigImage>
    <img #bigImageViewerHR [src]="this.showBigImageHR()" id="galleryBigImageViewerHR" (click)="closeBigImage($event)" [class.bigImageHRvisible]="this.hrImageLoaded" (load)="hrImageDoneLoading()">
    <img #bigImageViewerLR [src]="this.showBigImageLR()" id="galleryBigImageViewerLR" (click)="closeBigImage($event)">
    <h1 id="galeryBigImageClose" (click)="closeBigImage($event)">✕</h1>

    @if (!this.hrImageLoaded) {
    <div id="hrLoadingWrapper">
        <ng-lottie [options]="this.animationOptions()"></ng-lottie>
        <h3>Lade HD Variante...</h3>
    </div>
    }
</div>
}
