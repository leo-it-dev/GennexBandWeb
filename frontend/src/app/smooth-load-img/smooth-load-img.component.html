<img id="display" [src]="this.src" (load)="onLoaded()" (error)="onError()">
@if(this.showFade()) {
    <div id="fade-overlay" [animate.enter]="'fade-in'" [animate.leave]="'fade-out'" [style.--fadeDuration]="this.fadeDuration + 'ms'" ></div>
}
<div class="tapToOpen" (click)="handleClick()">
    <img src="/images/expand.png" />
</div>
