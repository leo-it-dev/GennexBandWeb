<table class="row-content row-content-dat" style="border-bottom: 1px solid #e4e4e4; width:100%">
	<tr>

		<td width="40%" valign="top" style="padding:30px 0;vertical-align: middle;">
			<h2
				style="color:#7200d6; margin:0; font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 38px; font-weight: 700">
				Wer:</h2>
		</td>

		<td width="60%" valign="top" style="padding:30px 0;vertical-align: middle;">
			<p style="margin:0; font-family: Arial, Helvetica Neue, Helvetica, sans-serif">
				{firstName} {lastName} <br /> {email}
			</p>
		</td>

	</tr>
</table>

		<td width="40%" valign="top" style="padding:30px 0;vertical-align: middle;">
			<h2
				style="color:#ba00d6; margin:0; font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 38px; font-weight: 700">
				Nachricht:</h2>
		</td>

		<td width="60%" valign="top" style="padding:30px 0;vertical-align: middle;">
			<p style="margin:0; font-family: Arial, Helvetica Neue, Helvetica, sans-serif">
				{message}
			</p>
		</td>

	</tr>
</table>
