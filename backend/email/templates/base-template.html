<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker:wght@100;200;300;400;500;600;700;800;900" rel="stylesheet" type="text/css">
	<title>Gennex Partyband | {subjectTitle}</title>

	<style>
		html {
			margin: 0;
			padding: 0;
		}

		body {
			margin: 0;
			padding: 0;
			background: #ffffff;
		}

		table {
			border-spacing: 0;
			border-collapse: collapse;
		}

		.row-content {
			width: 100%;
		}

		.row-content-dat {
			max-width: 580px;
		}

		.row-content-dat td {
			padding: 0px 20px;
		}
	</style>

</head>

<body class="body" style="margin: 0; padding: 0;">

	<table width="100%" cellpadding="0" cellspacing="0" style="padding: 0; margin: 0;">
		<tr width="100%" style="margin: 0; padding: 0;">
			<td align="center" style="margin: 0; padding: 0;" width="100%">

				<table class="row-content" width="100%">
					<tr>
						<td style="background:#353535; padding:35px; font-size: 0; line-height: 0;" align="center">
							<img src="{serverBaseURL}/images/logo0014.png" width="153" alt="Logo" style="display: block; line-height: 0; font-size: 0; border: 0; margin: 0; padding: 0;">
						</td>
					</tr>

					<tr>
						<td style="background-color: #d5d5d5; background-image: url('https://media.beefree.cloud/pub/bfra/nnpmtsfv/yhr/q8j/jm0/Screenshot%202026-03-21%20001852.png'); background-repeat: no-repeat; background-size: cover; padding:20px 20px; text-align:center;">

							<h1 style="color:#ffffff; font-family:'Permanent Marker', Impact, Charcoal, sans-serif; font-size:32px; letter-spacing:3px; margin:0;">
								{subject}
							</h1>

						</td>
					</tr>

				</table>

				<table class="row-content">
					<tr>
						<td style="height:30px;"></td>
					</tr>
				</table>

                {content}

				<table class="row-content">
					<tr>
						<td style="padding:30px 20px; text-align:center;">

							<hr>

							<p style="font-family: Arial, Helvetica Neue, Helvetica, sans-serif"><strong>GENNEX
									Partyband | Rock | Punk | Hardrock</strong></p>

							<table class="social-table" width="106px" border="0" cellpadding="0" cellspacing="0" role="presentation" style="mso-table-lspace: 0pt; mso-table-rspace: 0pt; display: inline-block;">
								<tr>
									<td style="padding:0 0 0 0px;"><a href="https://www.instagram.com/gennex_official/" target="_blank">
										<img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/t-only-logo-dark-gray/instagram@2x.png" width="32" height="auto" alt="instagram" title="instagram" style="display: block; height: auto; border: 0;"></a>
									</td>
									<td style="padding:0 0 0 5px;"><a href="https://www.youtube.com/@GennexPartyband" target="_blank">
										<img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/t-only-logo-dark-gray/youtube@2x.png" width="32" height="auto" alt="YouTube" title="YouTube" style="display: block; height: auto; border: 0;"></a>
									</td>
									<td style="padding:0 0 0 5px;"><a href="https://gennex.band" target="_blank">
										<img src="https://app-rsrc.getbee.io/public/resources/social-networks-icon-sets/t-only-logo-dark-gray/website@2x.png" width="32" height="auto" alt="Web Site" title="Web Site" style="display: block; height: auto; border: 0;"></a>
									</td>
								</tr>
							</table>

							{footer}
						</td>
					</tr>
				</table>

                {belowMail}

			</td>
		</tr>
	</table>

</body>

</html>
